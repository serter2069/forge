<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Forge Control Center</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
<style>
  /* Warm beige / sand palette */
  :root {
    --bg:       #f5f0e8;
    --bg2:      #ede8de;
    --bg3:      #e5dfd3;
    --border:   #cfc8b8;
    --text:     #2e2a22;
    --text2:    #6b6558;
    --text3:    #9b9488;
    --accent:   #6c63a6;
    --accent-h: #5a5290;
    --danger:   #c0392b;
    --danger-h: #a93226;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; }

  .app { display: flex; height: 100vh; }
  .sidebar {
    width: 300px; min-width: 300px;
    background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .sidebar header h1 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 0.3px; }
  .sidebar header .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); display: inline-block; margin-right: 6px; }
  .sidebar header .status-dot.ok { background: #3a8c4a; }
  .sidebar .actions { padding: 10px 14px; border-bottom: 1px solid var(--border); }

  button {
    background: var(--accent); color: #fff; border: none; padding: 8px 12px;
    border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500;
  }
  button:hover { background: var(--accent-h); }
  button.ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  button.ghost:hover { background: var(--bg3); }
  button.danger { background: var(--danger); }
  button.danger:hover { background: var(--danger-h); }

  .session-list { flex: 1; overflow-y: auto; padding: 6px; }
  .session-item {
    padding: 10px 12px; border-radius: 6px; cursor: pointer;
    margin-bottom: 4px; border: 1px solid transparent;
  }
  .session-item:hover { background: var(--bg3); }
  .session-item.selected { background: #e8e2f7; border-color: #b8b0dc; }
  .session-item .task { font-size: 12px; line-height: 1.3; color: var(--text); overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .session-item .meta { margin-top: 6px; display: flex; justify-content: space-between; font-size: 10px; color: var(--text2); }
  .badge { padding: 2px 6px; border-radius: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: 10px; }
  .badge.running { background: #dce8fa; color: #2563c4; }
  .badge.done    { background: #d4f0da; color: #2a7a3a; }
  .badge.error   { background: #fad8d5; color: #c0392b; }

  .detail {
    border-top: 1px solid var(--border); padding: 12px 14px;
    max-height: 55%; overflow-y: auto; background: var(--bg2);
  }
  .detail h3 { margin: 0 0 6px 0; font-size: 11px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail .kv { margin-bottom: 5px; font-size: 12px; }
  .detail .kv label { color: var(--text2); display: inline-block; min-width: 70px; font-size: 11px; }
  .detail pre { background: var(--bg3); border: 1px solid var(--border); padding: 7px; border-radius: 4px; font-size: 10px; overflow: auto; max-height: 160px; white-space: pre-wrap; word-wrap: break-word; color: var(--text); }

  .canvas { flex: 1; position: relative; background: var(--bg); }
  #graph { width: 100%; height: 100%; }
  .legend {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    background: rgba(245,240,232,0.95); border: 1px solid var(--border);
    padding: 8px 10px; border-radius: 6px; font-size: 11px; color: var(--text2);
  }
  .legend .row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-backdrop.hidden { display: none; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 22px; width: 520px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .modal h2 { margin: 0 0 14px 0; font-size: 15px; color: var(--text); }
  .modal textarea {
    width: 100%; min-height: 110px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 10px;
    font-family: inherit; font-size: 13px; resize: vertical;
  }
  .modal textarea:focus, .modal input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .modal .row { display: flex; gap: 8px; margin-top: 10px; }
  .modal .row input { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-size: 12px; }
  .modal .actions { margin-top: 14px; display: flex; justify-content: flex-end; gap: 8px; }

  .empty { color: var(--text3); padding: 30px 14px; text-align: center; font-size: 12px; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <header>
      <h1>Forge Control Center</h1>
      <span><span class="status-dot" id="ws-dot"></span><span id="ws-label">offline</span></span>
    </header>
    <div class="actions">
      <button id="new-task-btn">+ New Task</button>
    </div>
    <div class="session-list" id="session-list">
      <div class="empty">No sessions yet. Create one above.</div>
    </div>
    <div class="detail" id="detail" style="display:none;"></div>
  </aside>
  <main class="canvas">
    <div class="legend">
      <div class="row"><span class="dot" style="background:#666"></span>waiting</div>
      <div class="row"><span class="dot" style="background:#2196F3"></span>running</div>
      <div class="row"><span class="dot" style="background:#4CAF50"></span>done</div>
      <div class="row"><span class="dot" style="background:#F44336"></span>error</div>
    </div>
    <div id="graph"></div>
  </main>
</div>

<div class="modal-backdrop hidden" id="modal">
  <div class="modal">
    <h2>New Forge Task</h2>
    <textarea id="task-input" placeholder="Describe the task. E.g. Build a minimal Express API with /health and /echo endpoints"></textarea>
    <div class="row">
      <input id="dir-input" placeholder="Working dir (optional)" />
      <input id="parallel-input" placeholder="Parallel (default 3)" type="number" min="1" max="12" style="max-width:140px;" />
    </div>
    <div class="actions">
      <button class="ghost" id="cancel-btn">Cancel</button>
      <button id="run-btn">Run</button>
    </div>
  </div>
</div>

<script>
const state = {
  sessions: new Map(),     // id -> session
  selectedId: null,
  selectedNodeKey: null,   // "<sessionId>/<taskId>" or "<sessionId>" for root
};

const COLORS = {
  waiting: '#a09888',
  running: '#3d6fd4',
  done:    '#2e8a45',
  error:   '#c0392b',
};

// --- Cytoscape init ---
const cy = cytoscape({
  container: document.getElementById('graph'),
  elements: [],
  style: [
    {
      selector: 'node[nodeType = "session"]',
      style: {
        'shape': 'round-rectangle',
        'background-color': '#e8e2f7',
        'border-color': '#b8b0dc',
        'border-width': 1.5,
        'label': 'data(label)',
        'color': '#2e2a22',
        'font-size': 11,
        'text-valign': 'center',
        'text-halign': 'center',
        'text-wrap': 'wrap',
        'text-max-width': 150,
        'width': 180,
        'height': 46,
      },
    },
    {
      selector: 'node[nodeType = "worker"]',
      style: {
        'background-color': 'data(color)',
        'label': 'data(label)',
        'color': '#fff',
        'font-size': 10,
        'text-outline-color': 'rgba(0,0,0,0.6)',
        'text-outline-width': 1.5,
        'text-valign': 'center',
        'text-halign': 'center',
        'text-wrap': 'wrap',
        'text-max-width': 88,
        'width': 90,
        'height': 90,
        'border-color': 'data(borderColor)',
        'border-width': 'data(borderWidth)',
        'pie-size': '100%',
        'pie-1-background-color': '#ffaa00',
        'pie-1-background-size': 'data(ctxPct)',
      },
    },
    {
      selector: 'node:selected',
      style: { 'border-color': '#fff', 'border-width': 3 },
    },
    {
      selector: 'edge',
      style: {
        'width': 1.5,
        'line-color': '#b8b0dc',
        'target-arrow-color': '#b8b0dc',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
      },
    },
    {
      selector: 'edge[edgeType = "session"]',
      style: { 'line-color': '#cfc8b8', 'target-arrow-color': '#cfc8b8', 'line-style': 'dashed' },
    },
  ],
  layout: { name: 'preset' },
  wheelSensitivity: 0.2,
});

let relayoutTimer = null;
function scheduleRelayout() {
  if (relayoutTimer) return;
  relayoutTimer = setTimeout(() => {
    relayoutTimer = null;
    try {
      cy.layout({
        name: 'cose',
        animate: false,
        fit: true,
        padding: 40,
        nodeRepulsion: 8000,
        idealEdgeLength: 120,
      }).run();
    } catch (e) { /* ignore */ }
  }, 500);
}

cy.on('tap', 'node', (evt) => {
  const n = evt.target;
  state.selectedNodeKey = n.id();
  const d = n.data();
  if (d.nodeType === 'session') state.selectedId = d.sessionId;
  else if (d.nodeType === 'worker') state.selectedId = d.sessionId;
  renderDetail();
  renderSessionList();
});

// --- Pulse animation for running nodes ---
let _pulseOn = false;
setInterval(() => {
  _pulseOn = !_pulseOn;
  cy.nodes('[nodeType = "worker"]').forEach(n => {
    if (n.data('status') === 'running') {
      n.data('borderWidth', _pulseOn ? 4 : 1.5);
      n.data('borderColor', '#61b4ff');
    } else {
      n.data('borderWidth', 1);
      n.data('borderColor', '#fff');
    }
  });
}, 700);

// --- Rendering ---
function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

function workerLabel(taskId, title, progress, status, message) {
  let label = '[' + taskId + '] ' + truncate(title, 18);
  if (status === 'running') {
    const pct = progress > 0 ? progress + '%' : '...';
    const act = message && message !== 'starting...' && message !== 'started' && message !== 'done'
      ? '\n' + truncate(message.replace(/^tool: /, ''), 12)
      : '';
    label += '\n' + pct + act;
  } else if (status === 'done') {
    label += '\ndone';
  } else if (status === 'error') {
    label += '\nerror';
  }
  return label;
}

function elapsed(s) {
  if (!s.startedAt) return '';
  const end = s.finishedAt || Date.now();
  const sec = Math.round((end - s.startedAt) / 1000);
  return sec + 's';
}

function rebuildGraph() {
  const nodes = [];
  const edges = [];

  for (const session of state.sessions.values()) {
    const sid = session.id;
    nodes.push({
      data: {
        id: sid,
        nodeType: 'session',
        sessionId: sid,
        label: truncate(session.task, 48),
      },
    });

    const states = session.states || {};
    const subtasks = session.subtasks || [];
    for (const st of subtasks) {
      const s = states[st.id] || { status: 'waiting', tokens: 0, title: st.title };
      const key = sid + '/' + st.id;
      const ctx = Math.min(1, (s.tokens || 0) / 200000);
      nodes.push({
        data: {
          id: key,
          nodeType: 'worker',
          sessionId: sid,
          taskId: st.id,
          label: workerLabel(st.id, s.title || st.title, s.progress || 0, s.status, s.message),
          color: COLORS[s.status] || COLORS.waiting,
          ctxPct: Math.round(ctx * 100),
          status: s.status,
          progress: s.progress || 0,
          borderWidth: 1,
          borderColor: '#fff',
        },
      });
      // session -> worker (dashed, no arrow style diff, conceptual)
      edges.push({
        data: { id: sid + '~' + st.id, source: sid, target: key, edgeType: 'session' },
      });
      // deps
      for (const dep of st.deps || []) {
        edges.push({
          data: { id: key + '<-' + dep, source: sid + '/' + dep, target: key, edgeType: 'dep' },
        });
      }
    }
  }

  cy.batch(() => {
    cy.elements().remove();
    cy.add(nodes);
    cy.add(edges);
  });
  scheduleRelayout();
}

function updateWorkerNode(sessionId, taskId, workerState) {
  const key = sessionId + '/' + taskId;
  const n = cy.getElementById(key);
  if (!n || n.empty()) {
    rebuildGraph();
    return;
  }
  const ctx = Math.min(1, (workerState.tokens || 0) / 200000);
  n.data('color', COLORS[workerState.status] || COLORS.waiting);
  n.data('ctxPct', Math.round(ctx * 100));
  n.data('status', workerState.status);
  n.data('progress', workerState.progress || 0);
  n.data('label', workerLabel(taskId, workerState.title, workerState.progress || 0, workerState.status, workerState.message));
}

function renderSessionList() {
  const list = document.getElementById('session-list');
  if (state.sessions.size === 0) {
    list.innerHTML = '<div class="empty">No sessions yet. Create one above.</div>';
    return;
  }
  const arr = Array.from(state.sessions.values()).sort((a, b) => b.createdAt - a.createdAt);
  list.innerHTML = arr.map((s) => {
    const sel = state.selectedId === s.id ? 'selected' : '';
    const counts = countStates(s);
    const when = new Date(s.createdAt).toLocaleTimeString();
    return `
      <div class="session-item ${sel}" data-id="${s.id}">
        <div class="task">${escapeHtml(s.task)}</div>
        <div class="meta">
          <span><span class="badge ${s.status}">${s.status}</span></span>
          <span>${counts.done}/${counts.total} · ${when}</span>
        </div>
      </div>
    `;
  }).join('');
  for (const el of list.querySelectorAll('.session-item')) {
    el.addEventListener('click', () => {
      state.selectedId = el.getAttribute('data-id');
      state.selectedNodeKey = state.selectedId;
      renderSessionList();
      renderDetail();
      const n = cy.getElementById(state.selectedId);
      if (!n.empty()) cy.center(n);
    });
  }
}

function countStates(s) {
  const states = s.states || {};
  const arr = Object.values(states);
  return {
    total: (s.subtasks || []).length,
    done: arr.filter((x) => x.status === 'done').length,
    running: arr.filter((x) => x.status === 'running').length,
    error: arr.filter((x) => x.status === 'error').length,
  };
}

function totalTokens(s) {
  const arr = Object.values(s.states || {});
  return arr.reduce((acc, x) => acc + (x.tokens || 0), 0);
}

function renderDetail() {
  const el = document.getElementById('detail');
  if (!state.selectedId) { el.style.display = 'none'; return; }
  const session = state.sessions.get(state.selectedId);
  if (!session) { el.style.display = 'none'; return; }
  el.style.display = 'block';

  // worker detail if worker node selected
  if (state.selectedNodeKey && state.selectedNodeKey.includes('/')) {
    const [sid, tidStr] = state.selectedNodeKey.split('/');
    const tid = parseInt(tidStr, 10);
    const st = (session.subtasks || []).find((x) => x.id === tid);
    const ws = (session.states || {})[tid];
    if (st) {
      el.innerHTML = `
        <h3>Worker [${tid}]</h3>
        <div class="kv"><label>Title</label>${escapeHtml(st.title)}</div>
        <div class="kv"><label>Status</label><span class="badge ${ws?.status || 'waiting'}">${ws?.status || 'waiting'}</span></div>
        <div class="kv"><label>Tokens</label>${ws?.tokens || 0} / 200000</div>
        <div class="kv"><label>Elapsed</label>${ws ? elapsed(ws) : '-'}</div>
        <div class="kv"><label>Message</label>${escapeHtml(ws?.message || '')}</div>
        ${ws?.error ? `<div class="kv"><label>Error</label><pre>${escapeHtml(ws.error)}</pre></div>` : ''}
        ${ws?.result ? `<div class="kv"><label>Result</label><pre>${escapeHtml(ws.result)}</pre></div>` : ''}
        <div class="kv"><label>Description</label><pre>${escapeHtml(st.description)}</pre></div>
        <div class="kv"><label>Files</label><div id="worker-files" style="font-size:11px;color:#7a7ea0;">loading...</div></div>
        <div class="kv"><label>Log</label><div id="worker-log-wrap"><button class="ghost" id="show-log-btn" style="font-size:11px;padding:3px 8px;">show last 30 lines</button></div></div>
        ${ws?.status === 'running' ? `<button class="danger" id="kill-worker" style="margin-top:8px;">Kill worker</button>` : ''}
      `;
      const killBtn = document.getElementById('kill-worker');
      if (killBtn) killBtn.addEventListener('click', async () => {
        await fetch(`/sessions/${sid}/workers/${tid}`, { method: 'DELETE' });
      });
      // load files async
      fetch(`/sessions/${sid}/manifest`).then(r => r.json()).then(files => {
        const el = document.getElementById('worker-files');
        if (!el) return;
        const mine = (files || []).filter(f => f.taskId === tid);
        if (mine.length === 0) { el.textContent = 'none yet'; return; }
        el.innerHTML = mine.map(f => `<div style="font-family:monospace">${escapeHtml(f.path)}</div>`).join('');
      }).catch(() => {});
      // load log on demand
      document.getElementById('show-log-btn')?.addEventListener('click', async () => {
        const wrap = document.getElementById('worker-log-wrap');
        if (!wrap) return;
        try {
          const data = await fetch(`/sessions/${sid}/workers/${tid}/log`).then(r => r.json());
          const lines = (data.lines || []).slice(-30).join('\n');
          wrap.innerHTML = `<pre style="font-size:10px;max-height:180px;overflow:auto;background:#0e0e20;padding:6px;border-radius:4px;">${escapeHtml(lines || '(empty)')}</pre>`;
        } catch { wrap.innerHTML = '<em>error loading log</em>'; }
      });
      return;
    }
  }

  // session detail
  const counts = countStates(session);
  const tok = totalTokens(session);
  el.innerHTML = `
    <h3>Session</h3>
    <div class="kv"><label>Task</label>${escapeHtml(session.task)}</div>
    <div class="kv"><label>Status</label><span class="badge ${session.status}">${session.status}</span></div>
    <div class="kv"><label>Created</label>${new Date(session.createdAt).toLocaleString()}</div>
    <div class="kv"><label>Tokens</label>${tok}</div>
    <div class="kv"><label>Progress</label>${counts.done}/${counts.total} done, ${counts.running} running, ${counts.error} error</div>
    ${session.error ? `<div class="kv"><label>Error</label><pre>${escapeHtml(session.error)}</pre></div>` : ''}
    <div style="margin-top:8px;"><button class="danger" id="kill-session">Kill session</button></div>
  `;
  const ks = document.getElementById('kill-session');
  if (ks) ks.addEventListener('click', async () => {
    if (!confirm('Kill this session?')) return;
    await fetch(`/sessions/${session.id}`, { method: 'DELETE' });
  });
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// --- WebSocket ---
let ws;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => { setWsStatus(true); };
  ws.onclose = () => { setWsStatus(false); setTimeout(connect, 2000); };
  ws.onerror = () => { /* onclose will reconnect */ };
  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    handleMessage(msg);
  };
}

function setWsStatus(ok) {
  const dot = document.getElementById('ws-dot');
  const lbl = document.getElementById('ws-label');
  dot.classList.toggle('ok', ok);
  lbl.textContent = ok ? 'online' : 'offline';
}

function handleMessage(msg) {
  if (msg.type === 'snapshot') {
    state.sessions.clear();
    for (const s of msg.sessions) state.sessions.set(s.id, s);
    rebuildGraph();
    renderSessionList();
    renderDetail();
    return;
  }
  if (msg.type === 'session_created' || msg.type === 'session_planned' || msg.type === 'session_done' || msg.type === 'session_error') {
    if (msg.session) state.sessions.set(msg.session.id, msg.session);
    rebuildGraph();
    renderSessionList();
    renderDetail();
    return;
  }
  if (msg.type === 'session_removed') {
    state.sessions.delete(msg.id);
    if (state.selectedId === msg.id) { state.selectedId = null; state.selectedNodeKey = null; }
    rebuildGraph();
    renderSessionList();
    renderDetail();
    return;
  }
  if (msg.envelope === 'event') {
    const session = state.sessions.get(msg.sessionId);
    if (!session) return;
    if (msg.states) session.states = msg.states;
    if (msg.taskId !== undefined && msg.state) {
      if (!session.states) session.states = {};
      session.states[msg.taskId] = msg.state;
      updateWorkerNode(msg.sessionId, msg.taskId, msg.state);
    }
    if (msg.type === 'session_done') {
      session.status = 'done';
    }
    renderSessionList();
    if (state.selectedId === msg.sessionId) renderDetail();
    return;
  }
}

// --- Modal ---
const modal = document.getElementById('modal');
document.getElementById('new-task-btn').addEventListener('click', () => {
  modal.classList.remove('hidden');
  document.getElementById('task-input').focus();
});
document.getElementById('cancel-btn').addEventListener('click', () => modal.classList.add('hidden'));
document.getElementById('run-btn').addEventListener('click', async () => {
  const task = document.getElementById('task-input').value.trim();
  if (!task) return;
  const dir = document.getElementById('dir-input').value.trim() || undefined;
  const parallel = parseInt(document.getElementById('parallel-input').value, 10) || undefined;
  try {
    const res = await fetch('/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task, dir, parallel }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      alert('Failed: ' + (err.error || res.status));
      return;
    }
    modal.classList.add('hidden');
    document.getElementById('task-input').value = '';
  } catch (e) {
    alert('Network error: ' + e.message);
  }
});

// initial load
fetch('/sessions').then((r) => r.json()).then((arr) => {
  for (const s of arr) state.sessions.set(s.id, s);
  rebuildGraph();
  renderSessionList();
});
connect();
</script>
